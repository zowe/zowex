name: Build

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  pull-requests: write

jobs:
  build:
    runs-on: ${{ matrix.os }}-latest
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu, windows, macos]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - run: npm ci

      - run: npm run build

      - run: npm run test

      - name: Get z/OS build run ID
        if: ${{ matrix.os == 'ubuntu' }}
        run: |
          RUN_ID=$(gh run list --commit=${{ github.event.pull_request.head.sha || github.sha }} --workflow=zos-build.yml --limit=1 --json=databaseId --jq='.[0].databaseId')
          echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Watch z/OS build
        if: ${{ matrix.os == 'ubuntu' && env.RUN_ID }}
        uses: actions/github-script@v7
        with:
          script: |
            const artifactName = "zowe-server-bin";
            const runId = process.env.RUN_ID;
            const timeoutMs = 30 * 60 * 1000;
            const intervalMs = 5 * 1000;
            const deadline = Date.now() + timeoutMs;
            let attempts = 0;
            const hasArtifact = async () => {
              const { data } = await github.rest.actions.listWorkflowRunArtifacts({
                owner: context.repo.owner,
                repo: context.repo.repo,
                run_id: runId,
              });
              return data.artifacts.some((a) => a.name === artifactName);
            };
            const isCompleted = async () => {
              const { data: run } = await github.rest.actions.getWorkflowRun({
                owner: context.repo.owner,
                repo: context.repo.repo,
                run_id: runId,
              });
              return run.status === "completed";
            };
            while (Date.now() < deadline) {
              core.info(`Checking for artifact "${artifactName}" (attempt ${++attempts} of ${Math.ceil(timeoutMs / intervalMs)})...`);
              if (await hasArtifact()) {
                core.info(`Artifact "${artifactName}" is available`);
                return;
              }
              if (await isCompleted()) {
                core.setFailed(`z/OS build run ${runId} completed without producing "${artifactName}"`);
                return;
              }
              await new Promise((r) => setTimeout(r, intervalMs));
            }
            core.setFailed(`Timed out after ${Math.round(timeoutMs / 60000)} minutes waiting for "${artifactName}"`);

      - name: Download server PAX into SDK bin
        if: ${{ matrix.os == 'ubuntu' }}
        run: gh run download $RUN_ID --dir packages/sdk/bin --name zowe-server-bin
        env:
          GH_TOKEN: ${{ github.token }}

      - run: npm run package
        if: ${{ matrix.os == 'ubuntu' }}

      - uses: actions/upload-artifact@v4
        id: cli-artifact-upload
        if: ${{ matrix.os == 'ubuntu' }}
        with:
          name: zowex-for-zowe-cli
          path: dist/zowex-for-zowe-cli-*.tgz

      - uses: actions/upload-artifact@v4
        id: sdk-artifact-upload
        if: ${{ matrix.os == 'ubuntu' }}
        with:
          name: zowex-sdk
          path: dist/zowe-zowex-for-zowe-sdk-*.tgz

      - name: Comment on PR
        if: ${{ github.event_name == 'pull_request' && matrix.os == 'ubuntu' && github.event.pull_request.head.repo.full_name == github.repository }}
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: Client artifacts
          number: ${{ github.event.pull_request.number }}
          message: |
            Client artifacts:
             - CLI Plug-in: ${{ steps.cli-artifact-upload.outputs.artifact-url }}
             - SDK: ${{ steps.sdk-artifact-upload.outputs.artifact-url }}
