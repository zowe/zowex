name: Build

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  pull-requests: write

jobs:
  build:
    runs-on: ${{ matrix.os }}-latest
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu, windows, macos]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - run: npm ci

      - run: npm run build

      - run: npm run test

      - name: Get z/OS build run ID
        if: ${{ matrix.os == 'ubuntu' }}
        run: |
          RUN_ID=$(gh run list --commit=${{ github.event.pull_request.head.sha || github.sha }} --workflow=zos-build.yml --limit=1 --json=databaseId --jq='.[0].databaseId')
          echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Watch z/OS build
        if: ${{ matrix.os == 'ubuntu' }}
        run: |
          [ -z "$RUN_ID" ] || gh run watch $RUN_ID
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Download server PAX into SDK bin
        if: ${{ matrix.os == 'ubuntu' }}
        run: gh run download $RUN_ID --dir packages/sdk/bin --name zowe-server-bin
        env:
          GH_TOKEN: ${{ github.token }}

      - run: npm run package
        if: ${{ matrix.os == 'ubuntu' }}

      - uses: actions/upload-artifact@v4
        id: cli-artifact-upload
        if: ${{ matrix.os == 'ubuntu' }}
        with:
          name: zowex-cli
          path: dist/zowex-cli-*.tgz

      - uses: actions/upload-artifact@v4
        id: vsce-artifact-upload
        if: ${{ matrix.os == 'ubuntu' }}
        with:
          name: zowex-vsce
          path: dist/*.vsix

      - uses: actions/upload-artifact@v4
        id: sdk-artifact-upload
        if: ${{ matrix.os == 'ubuntu' }}
        with:
          name: zowex-sdk
          path: dist/zowex-sdk-*.tgz

      - name: Comment on PR
        if: ${{ github.event_name == 'pull_request' && matrix.os == 'ubuntu' && github.event.pull_request.head.repo.full_name == github.repository }}
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: Client artifacts
          number: ${{ github.event.pull_request.number }}
          message: |
            Client artifacts:
             - CLI Plug-in: ${{ steps.cli-artifact-upload.outputs.artifact-url }}
             - VSCode Extension: ${{ steps.vsce-artifact-upload.outputs.artifact-url }}
             - SDK: ${{ steps.sdk-artifact-upload.outputs.artifact-url }}
