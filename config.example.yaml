activeProfile: default

profiles:
  default:
    # Name of Zowe SSH profile used to connect to z/OS
    # If you don't have Zowe profiles, run `zowe config init` to create a team configuration file.
    # Or uncomment the section below to define SSH config inline rather than using a Zowe profile.
    sshProfile: ssh
    # sshProfile:
    #   host: example.com
    #   port: 22
    #   user: ibmuser
    #   privateKey: /Users/ibmuser/.ssh/id_rsa
    #   # password: password  # Use password instead of private key

    # USS directory on z/OS where native code is built
    deployDir: ~/zowex

    # Command to run before building the native code
    # preBuildCmd: '. ~/entrypoint.sh'  # Run script to configure build environment

    # Environment variables forwarded to the test runner on z/OS (npm run z:test).
    # Use this to enable optional tests that depend on system-specific capabilities.
    # Local ZNP_* env vars always override these values when both are set.
    # testEnv:
    #   # Archival mechanism available on this LPAR (uncomment one):
    #   ZNP_CADISK: "1"      # CA Disk (Broadcom) — uses DARCHIVE / zowex data-set restore
    #   ZNP_DFSMSHSM: "1"   # DFSMShsm (IBM)     — uses HMIGRATE / HRECALL
